name = "AsymptoticSpectrumDistance"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["AsymptoticSpectrumDistance"]

[leanOptions]
pp.unicode.fun = true
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.30.0"

[[lean_lib]]
name = "AsymptoticSpectrumDistance"
